version: '3.8'


services:
  back-end:
    build: 
      context: ./back-end
    container_name: backend1
  front-end:
    build:
      context: ./front-end 
    container_name: frontend1
    depends_on:
      - back-end
  proxy:
    build:
      context: ./proxy
    ports:
      - "80:80"
    container_name: proxy
    depends_on:
      - back-end
      - front-end
